<!doctype html>
<html lang="th">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lab 09 · Mobile Application</title>
  <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600;700&amp;display=swap" rel="stylesheet">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Kanit', sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
      color: #f8b500;
      min-height: 100%;
      text-shadow: none;
      position: relative;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
      background:
        radial-gradient(circle at 20% 80%, rgba(248, 181, 0, 0.08) 0%, transparent 50%),
        radial-gradient(circle at 80% 20%, rgba(229, 89, 52, 0.08) 0%, transparent 50%),
        radial-gradient(circle at 40% 40%, rgba(0, 212, 170, 0.05) 0%, transparent 40%);
      pointer-events: none;
      z-index: 0;
    }

    /* ── Back Button ── */
    .btn-back {
      position: fixed;
      top: 20px;
      left: 20px;
      z-index: 999;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: linear-gradient(135deg, rgba(248, 181, 0, 0.15) 0%, rgba(229, 89, 52, 0.15) 100%);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(248, 181, 0, 0.4);
      border-radius: 50px;
      padding: 12px 24px 12px 18px;
      font-family: 'Kanit', sans-serif;
      font-size: 0.9rem;
      font-weight: 600;
      color: #f8b500;
      text-decoration: none;
      text-shadow: 0 2px 8px rgba(0, 0, 0, 0.3);
      box-shadow:
        0 4px 20px rgba(0, 0, 0, 0.3),
        inset 0 1px 0 rgba(255, 255, 255, 0.1);
      transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .btn-back:hover,
    .btn-back:active {
      background: linear-gradient(135deg, #f8b500 0%, #e55934 100%);
      color: #1a1a2e;
      transform: translateY(-2px);
      box-shadow:
        0 8px 30px rgba(248, 181, 0, 0.4),
        inset 0 1px 0 rgba(255, 255, 255, 0.2);
    }

    /* Header */
    header {
      position: relative;
      z-index: 1;
      background: linear-gradient(180deg, rgba(15, 52, 96, 0.8) 0%, transparent 100%);
      border-bottom: 1px solid rgba(248, 181, 0, 0.2);
      padding: 80px 24px 50px;
      text-align: center;
    }

    header::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 200px;
      height: 3px;
      background: linear-gradient(90deg, transparent, #f8b500, #e55934, transparent);
      border-radius: 2px;
    }

    header h1 {
      font-size: clamp(2.2rem, 7vw, 4rem);
      font-weight: 700;
      background: linear-gradient(135deg, #f8b500 0%, #e55934 50%, #00d4aa 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: 0.08em;
      margin-bottom: 12px;
      filter: drop-shadow(0 4px 20px rgba(248, 181, 0, 0.3));
    }

    header p {
      font-size: 1.1rem;
      font-weight: 300;
      color: rgba(255, 255, 255, 0.7);
      letter-spacing: 0.2em;
      text-transform: uppercase;
    }

    .student-info {
      display: inline-flex;
      flex-direction: column;
      align-items: center;
      gap: 4px;
      margin-top: 28px;
      background: linear-gradient(135deg, rgba(248, 181, 0, 0.1) 0%, rgba(229, 89, 52, 0.1) 100%);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(248, 181, 0, 0.3);
      border-radius: 16px;
      padding: 16px 36px;
      box-shadow: 0 8px 32px rgba(0, 0, 0, 0.2);
    }

    .student-info .s-id {
      font-size: 0.85rem;
      color: rgba(248, 181, 0, 0.8);
      font-weight: 400;
      letter-spacing: 0.15em;
    }

    .student-info .s-name {
      font-size: 1.2rem;
      font-weight: 600;
      background: linear-gradient(90deg, #f8b500, #e55934);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    /* Main */
    main {
      position: relative;
      z-index: 1;
      max-width: 1000px;
      margin: 0 auto;
      padding: 60px 24px;
    }

    .section-title {
      font-size: 0.85rem;
      font-weight: 600;
      color: #00d4aa;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      margin-bottom: 28px;
      padding-left: 20px;
      position: relative;
      text-shadow: 0 0 20px rgba(0, 212, 170, 0.5);
    }

    .section-title::before {
      content: '';
      position: absolute;
      left: 0;
      top: 50%;
      transform: translateY(-50%);
      width: 4px;
      height: 24px;
      background: linear-gradient(180deg, #00d4aa, #f8b500);
      border-radius: 2px;
      box-shadow: 0 0 15px rgba(0, 212, 170, 0.6);
    }

    /* Screenshots */
    .screenshots {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 28px;
      margin-bottom: 60px;
    }

    @media (max-width: 700px) {
      .screenshots {
        grid-template-columns: 1fr;
        max-width: 320px;
        margin-left: auto;
        margin-right: auto;
      }
    }

    .img-slot {
      display: flex;
      flex-direction: column;
      gap: 12px;
      padding: 16px;
      background: linear-gradient(135deg, rgba(255, 255, 255, 0.03) 0%, rgba(255, 255, 255, 0.01) 100%);
      border: 1px solid rgba(248, 181, 0, 0.15);
      border-radius: 20px;
      transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }

    .img-slot:hover {
      transform: translateY(-8px);
      border-color: rgba(248, 181, 0, 0.4);
      box-shadow:
        0 20px 40px rgba(0, 0, 0, 0.3),
        0 0 40px rgba(248, 181, 0, 0.1);
    }

    .img-slot .slot-label {
      font-size: 1rem;
      font-weight: 600;
      color: #f8b500;
      letter-spacing: 0.05em;
    }

    .img-slot .slot-desc {
      font-size: 0.9rem;
      color: rgba(255, 255, 255, 0.6);
      font-weight: 300;
      line-height: 1.5;
    }

    .img-slot img {
      width: 100%;
      aspect-ratio: 9/16;
      object-fit: cover;
      border-radius: 14px;
      border: 2px solid rgba(248, 181, 0, 0.3);
      background: linear-gradient(135deg, rgba(248, 181, 0, 0.05) 0%, rgba(229, 89, 52, 0.05) 100%);
      display: block;
      transition: all 0.4s ease;
    }

    .img-slot:hover img {
      border-color: rgba(248, 181, 0, 0.6);
      box-shadow: 0 0 30px rgba(248, 181, 0, 0.2);
    }

    hr {
      border: none;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(248, 181, 0, 0.3), rgba(229, 89, 52, 0.3), transparent);
      margin: 50px 0;
    }

    /* Video */
    .video-duration {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      background: linear-gradient(135deg, rgba(0, 212, 170, 0.15) 0%, rgba(248, 181, 0, 0.15) 100%);
      backdrop-filter: blur(10px);
      border: 1px solid rgba(0, 212, 170, 0.4);
      border-radius: 50px;
      padding: 8px 20px;
      font-size: 0.9rem;
      color: #00d4aa;
      font-weight: 600;
      margin-bottom: 20px;
      box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
    }

    .video-slot video {
      width: 100%;
      border-radius: 20px;
      border: 2px solid rgba(248, 181, 0, 0.3);
      background: linear-gradient(135deg, rgba(248, 181, 0, 0.05) 0%, rgba(229, 89, 52, 0.05) 100%);
      display: block;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.3);
      transition: all 0.4s ease;
    }

    .video-slot video:hover {
      border-color: rgba(248, 181, 0, 0.6);
      box-shadow:
        0 15px 50px rgba(0, 0, 0, 0.4),
        0 0 40px rgba(248, 181, 0, 0.15);
    }

    /* ลบ text-shadow แบบเดิมออก ใช้แบบใหม่ที่เบากว่า */
    .student-info,
    .section-title,
    .img-slot .slot-label,
    .img-slot .slot-desc,
    .video-duration {
      text-shadow: 0 2px 10px rgba(0, 0, 0, 0.3);
    }
  </style>
  <style>
    body {
      box-sizing: border-box;
    }
  </style>
  <script src="https://cdn.tailwindcss.com/3.4.17" type="text/javascript"></script>
  <script src="/_sdk/data_sdk.js" type="text/javascript"></script>
  <script src="/_sdk/element_sdk.js" type="text/javascript"></script>
</head>

<body>
  <header>
    <h1>Lab 09 · Mobile Application</h1>
    <p>ตัวอย่างผลงาน</p>
    <div class="student-info"><span class="s-id">รหัสนักศึกษา: 663380219-4</span> <span class="s-name">นายพศวีร์
        ผองแก้ว</span>
    </div>
  </header>
  <main>
    <h2 class="section-title">Screenshots</h2>
    <div class="screenshots">
      <div class="img-slot"><span class="slot-label">หน้าแรก</span> <span
          class="slot-desc">หน้าหลักของแอปพลิเคชัน</span> <img
          src="imgs/1.png" alt="Screenshot 1" loading="lazy"
          onerror="this.style.background='linear-gradient(135deg, #1a1a2e, #16213e)'; this.alt='Image unavailable';">
      </div>
      <div class="img-slot"><span class="slot-label">รายการ</span> <span class="slot-desc">หน้าแสดงรายการทั้งหมด</span>
        <img src="imgs/2.png" alt="Screenshot 2" loading="lazy"
          onerror="this.style.background='linear-gradient(135deg, #1a1a2e, #16213e)'; this.alt='Image unavailable';">
      </div>
      <div class="img-slot"><span class="slot-label">รายละเอียด</span> <span
          class="slot-desc">หน้าแสดงข้อมูลเพิ่มเติม</span> <img
          src="imgs/3.png" alt="Screenshot 3" loading="lazy"
          onerror="this.style.background='linear-gradient(135deg, #1a1a2e, #16213e)'; this.alt='Image unavailable';">
      </div>
    </div>
    <hr>
    <h2 class="section-title">Video Demo</h2>
    <div class="video-duration"><span>⏱</span> <span>1:00 นาที</span>
    </div>
    <div class="video-slot">
      <div style="left: 0; width: 100%; height: 0; position: relative; padding-bottom: 56.25%;"><iframe
          src="imgs/video.mp4"
          style="top: 0; left: 0; width: 100%; height: 100%; position: absolute; border: 0;" allowfullscreen
          scrolling="no" allow="encrypted-media *;"></iframe></div>
    </div>
  </main>
